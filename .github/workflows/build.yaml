name: Frappe Docker Build and Push Nexar POS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: string
      version:
        description: "Docker image version tag (e.g. v1.0.0)"
        required: true
        default: "1.0.0"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: NexaRift25/nexa_frappe_docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frappe Docker Image
        run: |
          # Define apps JSON
          export APPS_JSON='[
            {
              "url": "https://github.com/frappe/erpnext.git",
              "branch": "version-15"
            },
            {
              "url": "https://github.com/frappe/hrms.git",
              "branch": "version-15"
            },
            {
              "url": "https://github.com/NexaRift25/nexaERPNext.git",
              "branch": "main"
            }
          ]'

          # Convert apps JSON to base64
          export APPS_JSON_BASE64=$(echo ${APPS_JSON} | base64 -w 0)

          # Define tags: always push 'latest' and the input version
          DOCKER_HUB_IMAGE="nexarift/nexa-erpnext"
          VERSION="${{ inputs.version }}"

          # Build once with multiple tags and push to Docker Hub
          docker buildx build \
            --no-cache \
            --platform linux/amd64 \
            --build-arg FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg FRAPPE_BRANCH=version-15 \
            --build-arg PYTHON_VERSION=3.11.9 \
            --build-arg NODE_VERSION=20.19.2 \
            --build-arg APPS_JSON_BASE64="$APPS_JSON_BASE64" \
            --tag "${DOCKER_HUB_IMAGE}:latest" \
            --tag "${DOCKER_HUB_IMAGE}:${VERSION}" \
            --file images/custom/Containerfile \
            --push .